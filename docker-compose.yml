version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: michelin-mongo
    ports:
      - "27017:27017"
    volumes:
      - michelin_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: michelin_guide
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=michelin_guide
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - PORT=8000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true

volumes:
  michelin_mongo_data:
    driver: local